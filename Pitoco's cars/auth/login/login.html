<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pitoco's Cars — Login Expositor</title>
    
    <!-- Importação de fontes e biblioteca de ícones do Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- CSS LINKINGS -->
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>

    <div class="login-pagina">

      <!-- PAINEL ESQUERDO — Decorativo e Conceitual -->
      <div class="login-painel-esquerdo fundo-pontos">
        <a href="../../index.html" class="logo"><i class="fas fa-gauge-high"></i> Pitoco's <span>Cars</span></a>

        <div>
          <div class="linha-acento"></div>
          <h2 class="login-frase">
            Acelere.<br>
            Exiba.<br>
            <span>Conecte.</span>
          </h2>
        </div>

        <p class="login-rodape-painel">
          Portal de Eventos Clássicos & Esportivos · 2026
        </p>
      </div>

      <!-- PAINEL DIREITO — Área ativa do formulário -->
      <div class="login-painel-direito">
        <div class="login-form-card card-brilho">

          <h1 class="login-titulo">Piloto / Expositor</h1>
          <p class="login-subtitulo">Acesse o painel para gerenciar suas inscrições</p>

          <form class="login-form" action="../../admin/dashboard.html">

            <div class="campo-grupo">
              <label class="campo-label" for="email">E-mail de Cadastro</label>
              <input
                class="campo-input"
                type="email"
                id="email"
                name="email"
                placeholder="seu@email.com"
                required
              />
            </div>

            <div class="campo-grupo">
              <label class="campo-label" for="senha">Senha de Acesso</label>
              <input
                class="campo-input"
                type="password"
                id="senha"
                name="senha"
                placeholder="••••••••"
                required
              />
              <a href="#" class="login-esqueceu">Esqueceu sua senha?</a>
            </div>

            <!-- Botão de Login com ícone interno -->
            <button class="btn-primario login-btn-submit" type="submit">
              Entrar no Grid <i class="fas fa-sign-in-alt"></i>
            </button>

          </form>

          <p class="login-cadastro-link">
            Ainda não tem conta? <a href="../cadastro/cadastro.html">Cadastrar piloto</a>
          </p>

        </div>
      </div>

    </div>

  </body>
</html>
